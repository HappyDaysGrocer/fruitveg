<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Happy Days — In-House v3</title>
  <meta name="description" content="Happy Days in-house app — directors &amp; staff only. Buy run, stock, orders, costs &amp; margins.">

  <!-- PWA / theming -->
  <meta name="theme-color" content="#0d2818" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0d2818" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#0d2818">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="HD In-House">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="../icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="../icon-192.png">

  <link rel="stylesheet" href="css/app.css">
</head>
<body>

  <!-- Slim sticky header: brand row collapses on scroll, search stays -->
  <header class="hdr" id="hdr">
    <div class="brand">
      <img src="../happydays-wordmark.png" alt="Happy Days Fruit, Veg &amp; Grocery">
    </div>
    <div class="searchwrap">
      <svg class="search-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="7"></circle>
        <line x1="21" y1="21" x2="16.5" y2="16.5"></line>
      </svg>
      <input id="q" type="search" inputmode="search" placeholder="Search products…"
             autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
             enterkeyhint="search" aria-label="Search products" style="padding-right:46px">
      <button id="cmdbtn" type="button" aria-label="Jump to anything"
              style="position:absolute;right:6px;top:50%;transform:translateY(-50%);
                     width:34px;height:34px;border:0;border-radius:9px;
                     background:rgba(21,102,47,.12);font-size:16px;line-height:1;
                     cursor:pointer;-webkit-tap-highlight-color:transparent">⚡</button>
    </div>
  </header>

  <!-- Views render here. Initial skeleton = instant feedback before JS boots. -->
  <main id="view">
    <div class="skeleton-list" aria-hidden="true">
      <div class="row"><div class="row-main"><div class="skeleton sk-line w60"></div><div class="skeleton sk-line sm w30"></div></div><div class="skeleton sk-pill"></div></div>
      <div class="row"><div class="row-main"><div class="skeleton sk-line w70"></div><div class="skeleton sk-line sm w25"></div></div><div class="skeleton sk-pill"></div></div>
      <div class="row"><div class="row-main"><div class="skeleton sk-line w50"></div><div class="skeleton sk-line sm w35"></div></div><div class="skeleton sk-pill"></div></div>
      <div class="row"><div class="row-main"><div class="skeleton sk-line w65"></div><div class="skeleton sk-line sm w30"></div></div><div class="skeleton sk-pill"></div></div>
      <div class="row"><div class="row-main"><div class="skeleton sk-line w55"></div><div class="skeleton sk-line sm w28"></div></div><div class="skeleton sk-pill"></div></div>
      <div class="row"><div class="row-main"><div class="skeleton sk-line w62"></div><div class="skeleton sk-line sm w32"></div></div><div class="skeleton sk-pill"></div></div>
    </div>
    <noscript><p class="empty">Happy Days needs JavaScript turned on to work.</p></noscript>
  </main>

  <!-- Bottom navigation: 5 thumb-friendly tabs (in-house) -->
  <nav class="nav" id="nav" aria-label="Main">
    <button class="navbtn active" type="button" data-view="buy" aria-current="page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 4h2l2.5 12.5a2 2 0 0 0 2 1.5h7.5a2 2 0 0 0 2-1.5L21 7H6"></path>
        <circle cx="10" cy="20.5" r="1.2"></circle><circle cx="17" cy="20.5" r="1.2"></circle>
      </svg>
      <span>Buy</span>
    </button>
    <button class="navbtn" type="button" data-view="shop">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M5.5 9 8 3.5M18.5 9 16 3.5"></path>
        <path d="M3 9h18l-1.7 9.4a2 2 0 0 1-2 1.6H6.7a2 2 0 0 1-2-1.6L3 9z"></path>
        <path d="M9 13v3M12 13v3M15 13v3"></path>
      </svg>
      <span>Stock</span>
    </button>
    <button class="navbtn" type="button" data-view="orders">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M6 2.5h12V21l-2-1.4-2 1.4-2-1.4L10 21l-2-1.4L6 21V2.5z"></path>
        <path d="M9 7.5h6M9 11h6M9 14.5h4"></path>
      </svg>
      <span>Orders</span>
    </button>
    <button class="navbtn" type="button" data-view="money">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="9"></circle>
        <path d="M12 7v10M9.5 9.2c0-1 1.1-1.7 2.5-1.7s2.5.7 2.5 1.7-1.1 1.6-2.5 1.6-2.5.7-2.5 1.7 1.1 1.7 2.5 1.7 2.5-.7 2.5-1.7"></path>
      </svg>
      <span>Money</span>
    </button>
    <button class="navbtn" type="button" data-view="more">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <circle cx="5" cy="12" r="2"></circle>
        <circle cx="12" cy="12" r="2"></circle>
        <circle cx="19" cy="12" r="2"></circle>
      </svg>
      <span>More</span>
    </button>
  </nav>

  <!-- Header collapse: toggles body.scrolled, CSS does the animation.
       Lives in the shell because it is pure presentation. -->
  <script>
    (function () {
      var last = false;
      function onScroll() {
        var s = (window.scrollY || document.documentElement.scrollTop) > 24;
        if (s !== last) { last = s; document.body.classList.toggle('scrolled', s); }
      }
      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll();
    })();
  </script>

  <script type="module" src="js/app.js"></script>
  <script>
    /* Use the root network-first service worker (scope /fruitveg/) so app3's
       code/data files are ALWAYS pulled fresh when online — no more stale,
       cached old copy on the phone. Falls back to cache only when offline. */
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('../sw.js', { updateViaCache: 'none' });
    }
  </script>
</body>
</html>
